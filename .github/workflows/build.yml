name: Build Apex Ultra APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --dart-define=GEMINI_KEY=${{ secrets.GEMINI_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apex-ultra-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
